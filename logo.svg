<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo externo com gradiente -->
  <circle cx="60" cy="60" r="55" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Estrela branca no centro -->
  <g transform="translate(60, 60)">
    <!-- Ponta superior -->
    <polygon points="0,-25 6,-8 25,-8" fill="white"/>
    <!-- Ponta superior direita -->
    <polygon points="18,-18 13,-5 20,5" fill="white"/>
    <!-- Ponta direita -->
    <polygon points="25,0 8,6 8,25" fill="white"/>
    <!-- Ponta inferior direita -->
    <polygon points="18,18 5,13 5,20" fill="white"/>
    <!-- Ponta inferior -->
    <polygon points="0,25 -6,8 -25,8" fill="white"/>
    <!-- Ponta inferior esquerda -->
    <polygon points="-18,18 -13,5 -20,5" fill="white"/>
    <!-- Ponta esquerda -->
    <polygon points="-25,0 -8,6 -8,25" fill="white"/>
    <!-- Ponta superior esquerda -->
    <polygon points="-18,-18 -5,-13 -5,-20" fill="white"/>
  </g>
  
  <!-- Sombra -->
  <ellipse cx="60" cy="115" rx="50" ry="8" fill="rgba(0,0,0,0.1)"/>
</svg>
